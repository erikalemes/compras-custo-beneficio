name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt
      - name: Instalar dependências
        run: pip install -r requirements/dev.txt
      - name: Lint (Ruff)
        run: ruff check app tests
      - name: Formatação (Black)
        run: black --check app tests
        continue-on-error: true
      - name: Tipos (MyPy)
        run: mypy app
        continue-on-error: true
      - name: Testes (Pytest)
        run: pytest -q
      - name: Vulnerabilidades (pip-audit)
        run: pip-audit -r requirements/base.txt
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        run: npm ci --no-audit --no-fund
      - name: Lint (ESLint)
        run: npm run lint
      - name: Testes (Vitest)
        run: npm test
      - name: Build (Next.js)
        run: npm run build
      - name: Vulnerabilidades (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build da imagem do backend
        run: docker build -f backend/Dockerfile -t ccb-backend .
      - name: Build da imagem do frontend
        run: docker build -t ccb-frontend ./frontend
      - name: Smoke test do backend
        run: |
          docker run -d --name api -p 8000:8000 -e APP_MODE=demo ccb-backend
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health; then exit 0; fi
            sleep 2
          done
          docker logs api
          exit 1
